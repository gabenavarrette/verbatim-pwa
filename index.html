<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbatim — Scripture Memory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Verbatim</h1>
        <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle Theme">🌓</button>
    </header>

    <!-- PAGE 1: DASHBOARD (QUEUE) -->
    <main id="page-dashboard" class="page-container">
        <div class="summary-card">
            <h3>Active Queue</h3>
            <p id="queue-count">0 Verses Due</p>
        </div>
        <div id="dashboard-queue-list">
            <!-- Cards loop container dynamically handled via app.js -->
        </div>
    </main>

    <!-- PAGE 2: SCRIBE (INTAKE ENGINE) -->
    <main id="page-scribe" class="page-container hidden">
        <div class="input-group">
            <label class="input-label" for="input-ref">Scripture Reference</label>
            <input type="text" id="input-ref" placeholder="e.g., Psalm 23:1">
        </div>
        <button id="btn-fetch" class="btn-primary" style="margin-bottom: 20px;">Fetch Passage</button>

        <div id="scribe-preview" class="verse-card hidden">
            <div class="verse-ref" id="preview-ref"></div>
            <div class="verse-text" id="preview-text"></div>
            <div class="verse-cipher" id="preview-cipher"></div>
            <button id="btn-commit" class="btn-primary" style="margin-top: 15px;">Commit to Engine</button>
        </div>
    </main>

    <!-- PAGE 3: ARCHIVE (COMPREHENSIVE LIBRARY) -->
    <main id="page-archive" class="page-container hidden">
        <div style="margin-bottom: 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary);">
            Entire Library
        </div>
        <div id="archive-all-list">
            <!-- Master database archive list loop -->
        </div>
    </main>

    <!-- NAVIGATION OVERLAY BAR -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('dashboard')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Dashboard</span>
        </button>
        <button class="nav-item" onclick="switchTab('scribe')">
            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            <span>Scribe</span>
        </button>
        <button class="nav-item" onclick="switchTab('archive')">
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
            <span>Archive</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
